# yaml-language-server: $schema=https://raw.githubusercontent.com/flatpak/flatpak-builder/main/data/flatpak-manifest.schema.json
id: dev.shob3r.yoohoo
command: yoohoo
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk//48
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
  - org.freedesktop.Sdk.Extension.rust-stable
writable-sdk: true

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --filesystem=xdg-run/path
  - --filesystem=home

modules:
  - name: yoohoo
    buildsystem: simple
    sources:
      - type: dir
        path: .
        skip:
          - ./.flatpak-builder
          - ./.yarn
          - ./build
          - ./dist
          - ./flatpak-builder-tools
          - ./node_modules
          - ./src-tauri/target
      - download-sources/cargo.json
      - download-sources/corepack.json
      - download-sources/yarn.json
    build-options:
      append-path: /usr/lib/sdk/node24/bin:/usr/lib/sdk/rust-stable/bin:/run/build/yoohoo/flatpak-node/corepack-shims
      env:
        HOME: /run/build/yoohoo
        CARGO_HOME: /run/build/yoohoo/src-tauri/cargo
        CARGO_NET_OFFLINE: "true"
        RUSTUP_HOME: /run/build/yoohoo/rustup
        XDG_CACHE_HOME: /run/build/yoohoo/flatpak-node/cache
        npm_config_nodedir: /usr/lib/sdk/node24
        COREPACK_HOME: /run/build/yoohoo/flatpak-node/corepack-home
        COREPACK_ENABLE_NETWORK: "0"
        YARN_ENABLE_TELEMETRY: "0"
        YARN_ENABLE_NETWORK: "0"
        YARN_ENABLE_GLOBAL_CACHE: "0"
        YARN_GLOBAL_FOLDER: /run/build/yoohoo/flatpak-node/yarn-berry
    build-commands:
      - set -e
      - ./flatpak-node/autogen.sh
      - yarn install
      - yarn tauri build
      - ar -x src-tauri/target/release/bundle/deb/*.deb
      - tar -xf data.tar.gz
      - install -Dm0644 LICENSE -t ${FLATPAK_DEST}/share/licenses/$FLATPAK_ID/yoohoo
      - install -Dm755 ./usr/bin/yoohoo /app/bin/yoohoo
      - install -Dm644 ./usr/share/applications/yoohoo.desktop /app/share/applications/dev.shob3r.yoohoo.desktop
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/yoohoo.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/yoohoo.png
      - install -Dm644 src-tauri/icons/64x64.png /app/share/icons/hicolor/64x64/apps/yoohoo.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/512x512/apps/yoohoo.png
      - install -Dm644 src-tauri/icons/icon.svg /app/share/icons/hicolor/scalable/apps/yoohoo.svg
      - install -Dm644 ./usr/share/metainfo/dev.shob3r.yoohoo.metainfo.xml /app/share/metainfo/dev.shob3r.yoohoo.metainfo.xml
