[package]
name = "Elysiae"
version = "1.0.0"
description = "Universal 'Anime Game' Launcher for Linux Hosts"
authors = [
    "Shob3r <andrewpinter23@gmail.com>",
    "ChakornK <chakornk2007@gmail.com>",
    "The Elysiae Project",
    "Elysiae Contributors",
]
edition = "2024"

[lib]
name = "elysiae_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
tauri = { version = "2.10.3", features = ["protocol-asset"] }
tauri-plugin-opener = "2.5.3"

serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"

tauri-plugin-http = "2.5.8"
tauri-plugin-fs = "2.5.0"
tauri-plugin-os = "2.3.2"
tauri-plugin-log = "2.8.0"
tauri-plugin-store = "2.4.2"
tauri-plugin-notification = "2.3.3"

glib = "0.22.4"
tauri-plugin-shell = "2.3.5"
reqwest = { version = "0.13.2", features = ["stream", "blocking", "json"] }
futures-util = "0.3.32"

walkdir = "2.5.0"
zstd = "0.13.3"
xz = "0.1.0"
flate2 = "1.1.9"
zip = "8.5.0"
tar = "0.4.45"
bytes = "1.11.1"
md5 = "0.8.0"
tokio = { version = "1.51.0", features = ["rt"] }
twox-hash = "2.1.2"
prost = "0.14.3"

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-single-instance = "2.4.1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 3
panic = "abort"
