# Make sure to have flathub installed on flatpak so flatpak-builder can auto-install everything else
id: net.shob3r.yoohoo

runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

command: yoohoo
finish-args:
  - --socket=wayland
  - --socket=fallback-x11 # Some styles I created only work with Wayland afaik. There will be some issues with some styles
  - --device=dri
  - --share=ipc
  - --share=network
  - --filesystem=xdg-run/path
  - --filesystem=home
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
  - org.freedesktop.Sdk.Extension.rust-stable
build-options:
  append-path: /usr/lib/sdk/node24/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - name: yoohoo
    buildsystem: simple
    env:
      HOME: /run/build/yoohoo
      CARGO_HOME: /run/build/yoohoo/cargo
      RUSTUP_HOME: /run/build/yoohoo/rustup
      XDG_CACHE_HOME: /run/build/yoohoo/flatpak-node/cache
      yarn_config_offline: "true"
      yarn_config_cache: /run/build/yoohoo/flatpak-node/yarn-cache
    sources:
      - type: git
        url: https://github.com/Shob3r/yoohoo.git
        tag: main
      - cargo-sources.json
      - node-sources.json

    build-commands:
      - set -e
      - echo -e 'yarn-offline-mirror "/run/build/yoohoo/flatpak-node/yarn-mirror"\nyarn-offline-mirror-pruning true' > /run/build/yoohoo/.yarnrc
      - mkdir -p src-tauri/.cargo && echo -e '[source.crates-io]\nreplace-with = "vendored-sources"\n\n[source.vendored-sources]\ndirectory = "/run/build/yoohoo/cargo/vendor"' > src-tauri/.cargo/config.toml
      - yarn install  --offline --immutable --immutable-cache --inline-builds
      - yarn run tauri build -- -b deb
      - ar -x src-tauri/target/release/bundle/deb/*.deb
      - tar -xf src-tauri/target/release/bundle/deb/yoohoo/data.tar.gz
      - install -Dm755 src-tauri/target/release/bundle/deb/yoohoo/data/usr/bin/yoohoo /app/bin/yoohoo
      - install -Dm644 src-tauri/target/release/bundle/deb/yoohoo/data/usr/share/applications/yoohoo.desktop /app/share/applications/net.shob3r.yoohoo.desktop
      - install -Dm644 src-tauri/target/release/bundle/deb/yoohoo/data/usr/share/icons/hicolor/128x128/apps/yoohoo.png /app/share/icons/hicolor/128x128/apps/yoohoo.png
      - install -Dm644 src-tauri/target/release/bundle/deb/yoohoo/data/usr/share/icons/hicolor/32x32/apps/yoohoo.png /app/share/icons/hicolor/32x32/apps/yoohoo.png
      - install -Dm644 src-tauri/target/release/bundle/deb/yoohoo/data/usr/share/icons/hicolor/256x256@2/apps/yoohoo.png /app/share/icons/hicolor/512x512/apps/yoohoo.png
      - install -Dm644 src-tauri/target/release/bundle/deb/yoohoo/data/usr/share/icons/hicolor/scalable/apps/yoohoo.svg /app/share/icons/hicolor/scalable/apps/yoohoo.svg

      - install -Dm644 src-tauri/target/release/bundle/deb/yoohoo/data/usr/share/metainfo/net.shob3r.yoohoo /app/share/metainfo/net.shob3r.yoohoo
