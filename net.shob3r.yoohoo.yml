id: net.shob3r.yoohoo
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.sdk

command: tauri-app
finish-args:
  - --socket=wayland
  - --share=ipc

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/node24/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - name: yoohoo
    buildsystem: simple
    env:
      HOME: /run/build/yoohoo
      CARGO_HOME: /run/build/yoohoo/src-tauri
      XDG_CACHE_HOME: /run/build/yoohoo/flatpak-node/cache
      yarn_config_offline: "true"
      yarn_config_cache: /run/build/yoohoo/flatpak-node/yarn-cache
    sources:
