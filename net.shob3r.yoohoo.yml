id: net.shob3r.yoohoo

runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk

command: yoohoo
finish-args:
  - --socket=wayland
  #  - --socket=fallback-x11 # I honestly don't think I should be supporting X11 since it's getting very close to being removed from pretty much all common DEs
  - --device=dri
  - --share=ipc
  - --share=network
  - --filesystem=xdg-run/path
  - --filesystem=home

build-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - name: yoohoo
    buildsystem: simple
    env:
      HOME: /run/build/yoohoo
      CARGO_HOME: /run/build/yoohoo/cargo
      RUSTUP_HOME: /run/build/yoohoo/rustup
      XDG_CACHE_HOME: /run/build/yoohoo/flatpak-node/cache
    sources:
      - type: dir
        path: .
      - cargo-sources.json

    build-commands:
      - set -e
      - cargo --version
      - mkdir -p src-tauri/.cargo && echo -e '[source.crates-io]\nreplace-with = "vendored-sources"\n\n[source.vendored-sources]\ndirectory = "/run/build/yoohoo/cargo/vendor"' > src-tauri/.cargo/config.toml
      - node flatpak-builder-prep.js
      - npm run tauri build -- -b deb
      - echo $PWD
      - ar -x src-tauri/target/release/bundle/deb/*.deb
      - tar -xf data.tar.gz
      - install -Dm755 ./usr/bin/yoohoo /app/bin/yoohoo
      - install -Dm644 ./usr/share/applications/yoohoo.desktop /app/share/applications/net.shob3r.yoohoo.desktop
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/yoohoo.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/yoohoo.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/512x512/apps/yoohoo.png
      # - install -Dm644 ./usr/share/icons/hicolor/scalable/apps/yoohoo.svg /app/share/icons/hicolor/scalable/apps/yoohoo.svg
      - install -Dm644 ./usr/share/metainfo/net.shob3r.yoohoo.metainfo.xml /app/share/metainfo/net.shob3r.yoohoo.metainfo.xml
