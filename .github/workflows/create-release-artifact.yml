name: Create Flatpak Release Artifact

on:
  workflow_dispatch:

jobs:
  package-elysiae:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v6
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: app.elysiae.Elysiae.flatpak
          manifest-path: app.elysiae.Eylsiae.yml
          cache-key: flatpak-builder-${{ github.sha }}
          branch: main
          upload-artifact: true
