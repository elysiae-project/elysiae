name: "Publish Release (flatpak)"

on:
  workflow_dispatch:

jobs:
  publish-yoohoo:
    permissions:
      contents: write
    strategy:
      fail-fast: false
    runs-on: "ubuntu-24.04"
    steps:
      - uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libasound2-dev libgtk-3-dev flatpak flatpak-builder
          flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo -y

      - name: Build Flatpak
        run: ./generate-build.sh # Makes a bit more sense

      - uses: actions/upload-artifact@v4
        with:
          name: yoohoo-artifact-${{ github.run_number }}.flatpak
          path: ./net.shob3r.yoohoo.flatpak
