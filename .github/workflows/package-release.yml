name: "Publish Release (flatpak)"

on:
  workflow_dispatch:

jobs:
  publish-yoohoo:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libasound2-dev libgtk-3-dev flatpak flatpak-builder python3 pipx python3-tomlkit python3-aiohttp curl
          flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo -y

      - name: Install Flatpak-builder dependencies
        run: |
          pipx install git+https://github.com/flatpak/flatpak-builder-tools.git#subdirectory=node
          curl -o ~/.local/bin/flatpak-cargo-generator.py https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/refs/heads/master/cargo/flatpak-cargo-generator.py

      - name: Update dependencies list
        run: |
          python3 ~/.local/bin/flatpak-cargo-generator -o download-sources/cargo.json ./src-tauri/Cargo.lock
          sed -i 's/"dest": "c/"dest": "src-tauri\/c/g' download-sources/cargo.json
          ~/.local/bin/flatpak-node-generator yarn -o download-sources/yarn.json yarn.lock

      - name: Build Flatpak
        run: flatpak-builder --force-clean --user --install-deps-from=flathub --repo=repo --install build dev.shob3r.yoohoo.yml

      - uses: actions/upload-artifact@v4
        with:
          name: yoohoo-artifact-${{ github.run_number }}.flatpak
          path: ./dev.shob3r.yoohoo.flatpak
