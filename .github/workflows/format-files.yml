name: Format Project Files
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
            token: ${{ secrets.PROJECT_LINTING_KEY }}

      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: |
          corepack enable
          yarn

      - name: Frontend Format
        run: yarn run prettier --write ./src/** ./download-sources/** .github/** ./scripts/**

      - name: Backend Format
        run: |
          cd src-tauri
          rustfmt --edition 2024 --style-edition 2024 --color always ./src/**.rs
          cargo clippy --fix --allow-dirty

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add --all
          git diff-index --quiet HEAD || git commit -m "chore: format & lint project files"
          git push origin HEAD:main
