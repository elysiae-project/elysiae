name: Format Project Files
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: |
          corepack enable
          yarn

      - name: Frontend Format
        run: yarn run prettier --write ./src/** ./download-sources/** .github/** ./scripts/**

      - name: Backend Format
        run: |
          cd src-tauri
          cargo clippy --fix --allow-dirty
